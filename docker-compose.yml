services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE:-telegram-ai-bot:local}
    container_name: telegram-ai-bot
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment:
      - PORT=8080
    command:
      - "-token"
      - "${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN required}"
      - "-webhook"
      - "${WEBHOOK_URL:?WEBHOOK_URL required}"
      - "-key"
      - "${API_KEY:?API_KEY required}"
      - "-url"
      - "${API_URL:-http://host.docker.internal:12345/v1}"
      - "-model"
      - "${MODEL:-smart}"
      - "-port"
      - "8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
